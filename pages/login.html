<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Login | Test Portal</title>
        <link rel="stylesheet" type="text/css" href="portalLogin.css">
    </head>
    <body class="portal-body">
        <div id="link-container">
            <a href="../index.html">Home</a>
        </div>

        <main class="portal-choose" id="chooseRole">
            <div class="portal-logo portal-logo-lg" aria-label="Test Portal">
                <span>Test</span><span>PORTAL</span>
            </div>

            <nav>
                <h1 class="portal-headline">Please select your login:</h1>
                <div class="role-icon-container">
                    <!-- Login 1 -->
                    <a class="choose-role-link" id="login1" data-role="login1"
                       href="login1.html" aria-labelledby="login1-label">
                        <span class="role-label" id="login1-label">Login 1</span>
                    </a>

                    <!-- Login 3 -->
                    <a class="choose-role-link" id="login3" data-role="login3"
                       href="login3.html" aria-labelledby="login3-label">
                        <span class="role-label" id="login3-label">Login 3</span>
                    </a>

                    <!-- Login 2 -->
                    <a class="choose-role-link" id="login2s" data-role="login2"
                       href="login2.html" aria-labelledby="login2s-label">
                        <span class="role-label" id="login2s-label">Login 2</span>
                    </a>
                </div>
            </nav>
        </main>

        <footer class="portal-footer">
            <a id="privacy" target="_blank" href="#">Privacy</a>
        </footer>

        <script src="portalLogin.js" defer></script>
    </body>
</html>
