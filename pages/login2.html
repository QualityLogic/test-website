<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Login 2 Login | Test Portal</title>
        <!-- Access guard: see login1.html for details. -->
        <script>
            (function () {
                var ROLE = 'login2', granted = null;
                try {
                    granted = sessionStorage.getItem('portalAccess');
                    sessionStorage.removeItem('portalAccess');
                } catch (e) { /* no storage -> treat as not granted */ }
                if (granted !== ROLE) { window.location.replace('login.html'); }
            })();
        </script>
        <link rel="stylesheet" type="text/css" href="portalLogin.css">
    </head>
    <body class="portal-body">
        <div id="link-container">
            <a href="../index.html">Home</a>
        </div>

        <main class="portal-shell">
            <div class="portal-logo portal-logo-sm" aria-label="Test Portal">
                <span>Test</span><span>PORTAL</span>
            </div>

            <div class="portal-card portal-card-wide">
                <nav class="role-switcher" aria-label="Choose a different login">
                    <a class="switch-role" id="switch-login1" data-role="login1" href="login1.html">
                        <span class="switch-label">Login 1</span>
                    </a>
                    <span class="switch-role is-active" aria-current="page">
                        <span class="switch-label">Login 2</span>
                    </span>
                    <a class="switch-role" id="switch-login3" data-role="login3" href="login3.html">
                        <span class="switch-label">Login 3</span>
                    </a>
                </nav>

                <h1 class="welcome">Welcome!</h1>
                <p class="role-subtitle">Login 2</p>

                <div class="portal-columns">
                    <div class="col-form">
                        <form class="portal-login-form" data-role="login2" novalidate>
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" autocomplete="username">

                            <label for="password">Password</label>
                            <div class="password-wrap">
                                <input type="password" id="password" name="password" autocomplete="current-password">
                                <button type="button" id="showPasswordButton" aria-label="Show password">
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>

                            <label for="schoolId">School ID</label>
                            <input type="text" id="schoolId" name="schoolId" autocomplete="off">

                            <button type="submit" class="login-btn">LOG IN</button>
                            <button type="button" id="forgotPasswordButton" class="link-btn">Forgot your password?</button>

                            <div class="or-divider"><span>OR</span></div>

                            <button type="button" class="sso-btn" id="sso-button-google" data-provider="Google">
                                <svg class="sso-icon" viewBox="0 0 48 48" width="20" height="20" aria-hidden="true">
                                    <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.2C12.4 13.4 17.7 9.5 24 9.5z"/>
                                    <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.6-4.9 7.3l7.6 5.9C43.9 38 46.5 31.8 46.5 24.5z"/>
                                    <path fill="#FBBC05" d="M10.5 28.4c-.5-1.4-.7-2.9-.7-4.4s.3-3 .7-4.4l-7.9-6.2C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.6l7.9-6.2z"/>
                                    <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.6-5.9c-2.1 1.4-4.9 2.3-8.3 2.3-6.3 0-11.6-3.9-13.5-9.4l-7.9 6.2C6.5 42.6 14.6 48 24 48z"/>
                                </svg>
                                Sign in with Google
                            </button>
                        </form>
                    </div>

                    <div class="col-qr">
                        <div class="qr-visual">
                            <svg class="qr-scan-arrow" viewBox="0 0 60 60" fill="none" stroke="#000" stroke-width="4" aria-hidden="true">
                                <path d="M6 40c0-18 14-30 34-30" stroke-linecap="round"/>
                                <path d="M30 6l12 4-6 11" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M6 34v10h10" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M2 30a4 4 0 004 4M2 30v-6M22 52h6M52 30a4 4 0 01-4 4" stroke-linecap="round"/>
                            </svg>
                            <svg class="qr-code" viewBox="0 0 100 100" aria-label="QR code" role="img">
                                <rect width="100" height="100" fill="#fff"/>
                                <!-- finder patterns -->
                                <path d="M6 6h24v24H6z M12 12h12v12H12z" fill="#000" fill-rule="evenodd"/>
                                <path d="M70 6h24v24H70z M76 12h12v12H76z" fill="#000" fill-rule="evenodd"/>
                                <path d="M6 70h24v24H6z M12 76h12v12H12z" fill="#000" fill-rule="evenodd"/>
                                <!-- data modules -->
                                <g fill="#000">
                                    <rect x="40" y="8" width="6" height="6"/><rect x="52" y="8" width="6" height="6"/>
                                    <rect x="46" y="16" width="6" height="6"/><rect x="58" y="16" width="6" height="6"/>
                                    <rect x="40" y="24" width="6" height="6"/><rect x="52" y="24" width="6" height="6"/>
                                    <rect x="8" y="40" width="6" height="6"/><rect x="20" y="40" width="6" height="6"/>
                                    <rect x="40" y="40" width="6" height="6"/><rect x="52" y="40" width="6" height="6"/><rect x="64" y="40" width="6" height="6"/><rect x="82" y="40" width="6" height="6"/>
                                    <rect x="14" y="48" width="6" height="6"/><rect x="46" y="48" width="6" height="6"/><rect x="70" y="48" width="6" height="6"/><rect x="88" y="48" width="6" height="6"/>
                                    <rect x="8" y="56" width="6" height="6"/><rect x="40" y="56" width="6" height="6"/><rect x="58" y="56" width="6" height="6"/><rect x="76" y="56" width="6" height="6"/>
                                    <rect x="40" y="70" width="6" height="6"/><rect x="52" y="70" width="6" height="6"/><rect x="70" y="70" width="6" height="6"/><rect x="88" y="70" width="6" height="6"/>
                                    <rect x="46" y="78" width="6" height="6"/><rect x="64" y="78" width="6" height="6"/><rect x="82" y="78" width="6" height="6"/>
                                    <rect x="40" y="88" width="6" height="6"/><rect x="58" y="88" width="6" height="6"/><rect x="76" y="88" width="6" height="6"/>
                                </g>
                            </svg>
                        </div>
                        <button type="button" class="qr-btn" id="qrLoginButton">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <rect x="3" y="5" width="18" height="14" rx="2"/>
                                <circle cx="12" cy="12" r="3.5"/>
                                <path d="M8 5l1.5-2h5L16 5"/>
                            </svg>
                            LOGIN WITH QR CODE
                        </button>
                        <a class="qr-help" href="#" target="_blank">Need help scanning your QR Code?</a>
                    </div>
                </div>

                <div class="login-status" id="login-status" role="status" aria-live="polite"></div>
            </div>
        </main>

        <footer class="portal-footer">
            <a id="privacy" target="_blank" href="#">Privacy</a>
        </footer>

        <script src="portalLogin.js" defer></script>
    </body>
</html>
